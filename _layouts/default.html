<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaulHermans.eu - {{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }
        
        header {
            background-color: #2d5016;
            color: #fff;
            padding: 2rem 0;
        }
        
        header .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        nav {
            background-color: #3d6b1f;
            padding: 1rem 0;
        }
        
        nav .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
        
        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        nav a:hover {
            color: #a8d08d;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        main {
            background-color: #fff;
            margin: 2rem 0;
            padding: 2rem;
            border-radius: 8px;
        }
        
        /* Markdown Content Styling */
        main h1 {
            color: #2d5016;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-size: 2em;
            border-bottom: 2px solid #3d6b1f;
            padding-bottom: 0.5rem;
        }
        
        main h2 {
            color: #2d5016;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-size: 1.5em;
        }
        
        main h3 {
            color: #3d6b1f;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-size: 1.2em;
        }
        
        main h4, main h5, main h6 {
            color: #3d6b1f;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        
        main p {
            margin-bottom: 1rem;
        }
        
        main ul, main ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }
        
        main li {
            margin-bottom: 0.5rem;
        }
        
        main ul ul, main ol ol, main ul ol, main ol ul {
            margin-top: 0.5rem;
            margin-left: 2rem;
        }
        
        main code {
            background-color: #f4f4f4;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
            color: #e83e8c;
        }
        
        main pre {
            background-color: #282c34;
            color: #abb2bf;
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        main pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
            border-radius: 0;
        }
        
        main blockquote {
            border-left: 4px solid #3d6b1f;
            padding-left: 1rem;
            margin: 1rem 0;
            color: #666;
            font-style: italic;
        }
        
        main hr {
            border: none;
            height: 2px;
            background-color: #3d6b1f;
            margin: 2rem 0;
        }
        
        main table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        
        main th, main td {
            border: 1px solid #ddd;
            padding: 0.75rem;
            text-align: left;
        }
        
        main th {
            background-color: #2d5016;
            color: #fff;
            font-weight: bold;
        }
        
        main tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        main a {
            color: #2d5016;
            text-decoration: none;
            border-bottom: 1px solid #2d5016;
        }
        
        main a:hover {
            text-decoration: underline;
            color: #3d6b1f;
        }
        
        main img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1rem 0;
        }

        article {
            margin: 2rem 0;
            padding-bottom: 2rem;
            border-bottom: 1px solid #eee;
        }
        
        article:last-child {
            border-bottom: none;
        }
        
        article h2 {
            margin-top: 0;
        }
        
        article h2 a {
            color: #2d5016;
            border-bottom: none;
        }
        
        article h2 a:hover {
            color: #3d6b1f;
        }
        
        .post-meta {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .excerpt {
            margin: 1rem 0;
            line-height: 1.6;
        }
        
        footer {
            background-color: #2d5016;
            color: #fff;
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>{{ site.title }}</h1>
            <p>{{ site.description }}</p>
        </div>
    </header>
    
    <nav>
        <div class="container">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/blog.html">Blog</a></li>
                <li><a href="/software.html">Software</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        <main>
            {{ content }}
        </main>
    </div>
    
    <footer>
        <p>&copy; 2026 {{ site.title }}. All rights reserved.</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('pre code').forEach((el) => {
                hljs.highlightElement(el);
            });
        });
    </script>
</body>
</html>
